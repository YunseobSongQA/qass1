name: Appium (manual only · emulator)

# Appium 은 Android 에뮬레이터에 의존하므로 배포 게이트에서 제외하고 수동 전용으로 둔다.
on:
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────
# ⚠️ 무료 한도 / runner 제약 (반드시 읽기)
# - Android 에뮬레이터는 KVM 하드웨어 가속이 필요하다. GitHub 호스티드 Linux
#   runner 는 중첩 가상화 지원이 제한적이라 부팅이 느리고(수 분) 플레이키하다.
# - macOS runner 는 가속이 되지만 분당 과금이 커서 무료 한도를 빠르게 소모한다.
# - 따라서 CI 에서는 "스모크 수준"(부팅+세션 연결 확인)만 목표로 하고,
#   정식 실행은 로컬 PC 전제다(README 의 'Appium은 로컬 실행' 참고).
# - 게이트에서 제외한 이유: 에뮬레이터 의존 + 느림 + 불안정.
# ─────────────────────────────────────────────────────────────────────────

env:
  AUTO_REPO: YunseobSongQA/Auto
  TARGET_URL: https://qass1.pages.dev

jobs:
  appium:
    name: Appium smoke (Android emulator)
    runs-on: ubuntu-latest
    steps:
      - name: Auto repo(테스트 소스) 체크아웃 → ./auto
        uses: actions/checkout@v4
        with:
          repository: ${{ env.AUTO_REPO }}
          path: auto

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: KVM 활성화 (에뮬레이터 가속)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 의존성 설치 + uiautomator2 드라이버
        working-directory: auto/automation-portfolio/appium
        run: |
          npm ci
          npx appium driver install uiautomator2 || true

      - name: 에뮬레이터 부팅 후 스모크 실행
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          working-directory: auto/automation-portfolio/appium
          script: |
            # Appium 서버를 백그라운드로 띄우고 wdio 스모크 실행.
            # 완전 동작이 어려우면 정보 제공용으로 둔다(게이트 아님 → 실패해도 배포 영향 없음).
            npx appium --base-path / &
            sleep 12
            npm test || echo "::warning::Appium 스모크 실패 — 정식 실행은 로컬 권장(README 참고)"

      - name: 결과/로그 artifact 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-result
          path: |
            auto/automation-portfolio/appium/artifacts
            auto/automation-portfolio/appium/*.log
          if-no-files-found: warn
