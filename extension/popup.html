<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>QA 증적 캡처</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- 방 연결 섹션 -->
  <div id="cloud-section" class="cloud-section">

    <!-- 방 연결됨 -->
    <div id="room-connected" class="room-connected hidden">
      <span class="cloud-icon"><svg viewBox="0 0 24 24" fill="none" width="16" height="16" aria-hidden="true"><path d="M3 6.5A1.5 1.5 0 0 1 4.5 5h4l2 2.2h7A1.5 1.5 0 0 1 19 8.7v8.8A1.5 1.5 0 0 1 17.5 19h-13A1.5 1.5 0 0 1 3 17.5v-11Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></span>
      <div class="room-connected-info">
        <span id="connected-room-name" class="connected-room-name"></span>
        <span id="connected-uploader" class="connected-uploader"></span>
      </div>
      <button id="btn-room-open" class="btn-disconnect btn-open" title="대시보드에서 이 방 열기">↗ 방 열기</button>
      <button id="btn-room-disconnect" class="btn-disconnect">연결 해제</button>
    </div>

    <!-- 방 연결/만들기 폼 -->
    <div id="room-connect-form" class="room-connect-form">
      <div id="room-connect-title" class="room-connect-title">방에 연결하여 자동 업로드</div>
      <input type="text" id="ext-room-name" placeholder="방 이름" autocomplete="off" />
      <div class="input-row">
        <input type="password" id="ext-room-password" placeholder="방 비밀번호" />
        <button id="btn-ext-test-hint" class="btn-ext-hint" title="테스트 방 자동입력">?</button>
      </div>
      <input type="text" id="ext-uploader-name" placeholder="내 이름 (업로드 시 표시됨)" autocomplete="off" />
      <button id="btn-room-connect" class="btn-connect">연결</button>
      <button id="btn-room-create" class="btn-connect btn-create hidden">방 만들기 + 연결</button>
      <a id="ext-mode-toggle" href="#" class="ext-mode-toggle">처음이세요? + 새 방 만들기</a>
      <p id="ext-connect-error" class="ext-error hidden"></p>
    </div>
  </div>

  <div class="header">
    <div class="header-title">QA 증적 캡처</div>
    <div class="header-controls">
      <button id="btn-toggle" class="btn-start">▶ 시작</button>
      <button id="btn-clear" class="btn-clear">초기화</button>
      <button id="btn-dl-all" class="btn-dlall">전체 저장</button>
    </div>
  </div>

  <div id="status-bar" class="status-bar stopped">
    <span id="status-text">대기 중 — 시작 버튼을 누르면 탭 이동 시 자동 캡처됩니다</span>
  </div>

  <div id="list" class="list">
    <div class="empty-msg">캡처된 페이지가 없습니다.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
