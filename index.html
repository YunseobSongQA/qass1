<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QASS — QA 증적 관리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">QASS</div>
      <p class="login-subtitle">QA 증적 관리 플랫폼</p>
      <input type="text" id="login-name" placeholder="이름을 입력하세요 (선택)" maxlength="30" autocomplete="off" />
      <p class="login-hint">이름을 비워두면 "익명"으로 입장합니다.</p>
      <button id="btn-login" class="btn-auth">테스트 계정으로 입장</button>
    </div>
  </div>

  <!-- 방 목록 화면 -->
  <div id="rooms-screen" class="hidden">
    <header class="topbar">
      <div class="topbar-brand">QASS</div>
      <div class="topbar-center">
        <span class="topbar-subtitle">QA 증적 관리 플랫폼</span>
      </div>
      <div class="topbar-right">
        <span id="rooms-user-badge" class="uploader-badge"></span>
        <button id="btn-create-room" class="btn-sm btn-primary">+ 방 만들기</button>
        <button id="btn-logout" class="btn-sm">로그아웃</button>
      </div>
    </header>

    <div class="rooms-hero">
      <h1 class="rooms-hero-title">QA 증적 방 목록</h1>
      <p class="rooms-hero-sub">방을 선택해 입장하거나, 새 방을 만들어 팀과 함께 증적을 관리하세요.</p>
    </div>

    <div id="rooms-grid" class="rooms-grid">
      <div class="empty-state">방 목록을 불러오는 중…</div>
    </div>
  </div>

  <!-- 방 내부 화면 -->
  <div id="room-screen" class="hidden">
    <header class="topbar">
      <div class="topbar-brand" id="btn-brand-home" style="cursor:pointer;" title="홈으로">QASS</div>
      <div class="topbar-center">
        <span id="room-name-label" class="room-name-label"></span>
        <span id="realtime-badge" class="realtime-badge hidden">● 실시간 연결됨</span>
      </div>
      <div class="topbar-right">
        <span id="uploader-badge" class="uploader-badge"></span>
        <label id="btn-upload" class="btn-sm btn-upload" title="이미지 직접 업로드">
          📎 <span class="btn-label-long">업로드</span>
          <input type="file" id="upload-input" accept="image/*" multiple hidden />
        </label>
        <button id="btn-dl-zip" class="btn-sm btn-primary">⬇ <span class="btn-label-long">ZIP 다운로드</span><span class="btn-label-short">ZIP</span></button>
        <button id="btn-back" class="btn-sm">← <span class="btn-label-long">방 목록</span><span class="btn-label-short">뒤로</span></button>
      </div>
    </header>

    <div class="toolbar">
      <input type="text" id="search" class="search-input" placeholder="URL 또는 페이지 제목으로 검색…" />
      <select id="filter-user" class="filter-select">
        <option value="">전체 업로더</option>
      </select>
      <span id="count-label" class="count-label">불러오는 중…</span>
    </div>

    <div id="captures-grid" class="captures-grid">
      <div class="empty-state">캡처된 증적이 없습니다.</div>
    </div>
  </div>

  <!-- 방 만들기 모달 -->
  <div id="create-room-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2>새 방 만들기</h2>
      <p>방 이름과 비밀번호를 설정하세요.<br>팀원들과 비밀번호를 공유하면 함께 사용할 수 있습니다.</p>
      <input type="text" id="new-room-name" placeholder="방 이름 (예: 1차 QA, 로그인 화면 테스트)" maxlength="50" />
      <input type="password" id="new-room-password" placeholder="비밀번호" />
      <input type="text" id="new-room-creator" placeholder="만든 사람 이름 (선택)" />
      <p id="create-room-error" class="auth-error hidden"></p>
      <div class="modal-actions">
        <button id="btn-create-room-submit" class="btn-auth">방 만들기</button>
        <button id="btn-create-room-cancel" class="btn-cancel">취소</button>
      </div>
    </div>
  </div>

  <!-- 방 입장 모달 -->
  <div id="enter-room-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2 id="enter-room-title">방 입장</h2>
      <p>비밀번호와 내 이름을 입력하세요.<br>이름은 업로드 시 캡처에 표시됩니다.</p>
      <div class="input-hint-row">
        <input type="password" id="enter-room-password" placeholder="비밀번호" />
        <button id="btn-test-hint" class="btn-hint" title="테스트 방 자동 입력">?</button>
      </div>
      <input type="text" id="enter-uploader-name" placeholder="내 이름 (예: 김QA, PL홍길동)" maxlength="30" />
      <p id="enter-room-error" class="auth-error hidden"></p>
      <div class="modal-actions">
        <button id="btn-enter-room-submit" class="btn-auth">입장</button>
        <button id="btn-enter-room-cancel" class="btn-cancel">취소</button>
      </div>
    </div>
  </div>

  <!-- 로딩 오버레이 -->
  <div id="loading" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
